name: Coach Exam (causa H · live)

# Examen semántico del coach contra las 4 capturas reales + el bug de lenguaje
# golfístico. Corre el coach REAL (Anthropic) contra data sembrada en memoria y
# juzga con Gemini. NO va en el CI por-PR (gastaría créditos de Anthropic en cada
# push y la protección per-PR ya la dan los tests offline del harness). Acá corre
# nocturno + on-demand. Si faltan los secrets, el examen SKIPEA honesto (no falso
# verde) gracias al gate describe.skipIf del propio test.

on:
  schedule:
    - cron: '0 8 * * *' # 08:00 UTC, nocturno Chile
  workflow_dispatch: {}

jobs:
  exam:
    name: Examen live (banco golden completo)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # NOTA: la persistencia de trazas (coach_eval_traces) + el gate puntuado vs
      # baseline los hace el runner ON-DEMAND scripts/cerebro-v3/run-coach-exam.ts
      # (npx tsx --env-file=.env.local ...), que necesita NEXT_PUBLIC_SUPABASE_URL +
      # SUPABASE_SERVICE_ROLE_KEY. Cuando vuelvan los créditos de Anthropic se puede
      # agregar acá un step que lo corra; hasta entonces no se exponen esos secrets a
      # un step que no los usa.
      - name: Examen semántico (live · correctness + 6 piezas, banco completo)
        run: npx vitest run src/golf/coach/v3/exam/__tests__/exam.test.ts
        env:
          COACH_EXAM_LIVE: '1'
          # Si estos secrets no están seteados, el examen LIVE se salta honesto.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
