name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Verificación (tsc + tests + build)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint (max-lines + no-restricted-imports gate)
        # next lint falla si hay reglas con severity "error". Las dos que
        # importan aquí: max-lines (800) bloquea NUEVOS archivos monstruo;
        # no-restricted-imports impide que src/golf/ importe react/next.
        # Los archivos preexistentes >800 LOC están exentos vía override en
        # .eslintrc.json. Cuando se refactorice uno, se quita del override
        # y la regla pasa a aplicar también ahí.
        run: npm run lint

      - name: Run tests
        run: npm run test -- --run

      - name: Build
        run: npm run build
        env:
          # Valores dummy sintácticamente válidos. No son los secrets reales
          # (Vercel usa los configurados en su dashboard). Son solo para que
          # el build colecione page data sin crashear en validaciones
          # módulo-level (web-push valida URL en setVapidDetails, etc.).
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-key
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          ANTHROPIC_API_KEY: placeholder
          # VAPID keys de prueba para CI. web-push valida formato P-256 base64url.
          # No encriptan nada real — producción usa keys distintas en Vercel.
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: BA24XsfwtZKyxQuWltINW-0e22ovEqfVNhqRxPSaFHIORQ3S1nn2mR9PCVAwcIVrLS3cpLFINX-UbICRU6VZu2w
          VAPID_PRIVATE_KEY: wsmrzpbRZZsztEIQimkkBc2jy-ZoaXvqyf49TZs6iUs
          VAPID_CONTACT_EMAIL: mailto:placeholder@example.com

  no-new-console:
    # Bloquea PRs que agregan nuevos console.log/warn/info/debug en código
    # productivo. Hoy hay 465 ocurrencias preexistentes que se migran
    # gradualmente (regla "el que toca, ordena" — ver CLAUDE.md). Este job
    # garantiza que el número no crece.
    name: Sin nuevos console.* en código productivo
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout (full history for diff)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      - name: Check no new console.*
        run: node scripts/check-no-new-console.mjs --base=origin/${{ github.base_ref }}

  audit:
    name: Auditoría de dependencias
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: npm audit (informativo — no bloquea)
        # Reporta HIGH/CRITICAL pero retorna siempre 0. Las vulnerabilidades
        # vivas se trackean en docs/TECH_DEBT.md. Este job es señal, no gate.
        # El gate real es que CRITICAL en runtime debe ser resuelto antes de push.
        run: |
          if npm audit --audit-level=critical; then
            echo "::notice::No hay vulnerabilidades CRITICAL"
          else
            echo "::error::Hay vulnerabilidades CRITICAL — ver npm audit y TECH_DEBT.md"
            exit 1
          fi
          npm audit --audit-level=high || echo "::warning::Hay vulnerabilidades HIGH sin parchar — ver docs/TECH_DEBT.md"

  e2e-smoke:
    # Smoke e2e contra producción. Solo en push a main (post-deploy Vercel).
    # Detecta regresiones de runtime que tsc+tests unit no pueden capturar:
    # hydration mismatch, 5xx, crashes en rutas públicas, redirects de auth.
    name: E2E smoke (producción)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push'
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: Wait for Vercel deploy (30s)
        # Vercel deploya en paralelo con este CI. Pausa corta para que el
        # deploy nuevo alcance. 30s es suficiente para builds normales.
        run: sleep 30

      - name: Run smoke e2e
        run: npm run test:e2e:smoke
        env:
          PLAYWRIGHT_BASE_URL: https://golfersplus.vercel.app
          CI: 'true'
          # global-setup.ts lee E2E_TEST_USER_EMAIL/PASSWORD — los secrets
          # en GH se llaman E2E_USER_EMAIL/PASSWORD (mismo mapeo que en
          # scorer-smoke.yml y e2e-trigger.yml). Sin esto el smoke postmerge
          # fallaba en main desde hace 3+ runs.
          E2E_TEST_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_TEST_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
