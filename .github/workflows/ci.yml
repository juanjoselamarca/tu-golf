name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Verificación (tsc + tests + build)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test -- --run

      - name: Build
        run: npm run build
        env:
          # Valores dummy para que el build no falle por env vars faltantes.
          # El build real en Vercel usa los secrets configurados allá.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-key
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          ANTHROPIC_API_KEY: placeholder
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: placeholder
          VAPID_PRIVATE_KEY: placeholder
          VAPID_CONTACT_EMAIL: placeholder@example.com

  audit:
    name: Auditoría de dependencias
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: npm audit (alto y crítico)
        run: npm audit --audit-level=high
