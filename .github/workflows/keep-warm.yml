name: Keep Warm

# Ping manual (backup) a /api/keep-warm de Golfers+ (región gru1, São Paulo).
#
# HISTORIA: este workflow tenía un `schedule: */5 * * * *` para mantener caliente
# la función serverless (evitar el cold start de ~1s en Hobby, que pega justo
# cuando se demuestra la app). NO FUNCIONABA: el scheduler de GitHub Actions
# estrangula y saltea los cron de repos de bajo tráfico — en la práctica corría
# cada 1-3 horas, no cada 5 min (medido 16-jul-2026: ~5 pings en 8h de noche).
# Con Vercel Hobby escalando a cero a los pocos minutos, eso no mantiene NADA
# caliente. El primer visitante seguía pagando el cold start.
#
# FUENTE DE VERDAD ACTUAL: un job pg_cron en Supabase ('keep-warm-golfers')
# pinguea /api/keep-warm cada 2 min vía pg_net. Supabase sí respeta el schedule
# (no lo estrangula como GitHub), así que ES confiable. Ver
# scripts/keep-warm-cron.sql y docs/CONVENCIONES_TECNICAS.md.
#
# Por eso acá queda SOLO workflow_dispatch: sirve como ping manual de respaldo
# (ej. tras un deploy), sin schedule automático que engañe al que lo lea.

on:
  workflow_dispatch:

concurrency:
  group: keep-warm
  cancel-in-progress: true

jobs:
  ping:
    name: Ping keep-warm
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping /api/keep-warm
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 \
            https://golfersplus.vercel.app/api/keep-warm)
          echo "keep-warm HTTP $code"
          # No fallamos el workflow si el ping no da 200: un cold start puntual o
          # un deploy en curso no debe ensuciar el historial con rojos. El único
          # objetivo es generar tráfico para que la función no escale a cero.
          exit 0
