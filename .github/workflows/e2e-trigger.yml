name: E2E Trigger (admin)

# Workflow disparado desde /admin/e2e via GitHub API workflow_dispatch.
# El run_id viene del row insertado en la tabla `e2e_runs` de Supabase.
# Al terminar (o fallar), POSTea resultados de vuelta a
# /api/admin/e2e/runs/[id]/callback con header x-e2e-callback-secret.

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'UUID del row en e2e_runs'
        required: true
        type: string
      base_url:
        description: 'URL contra la que correr Playwright'
        required: false
        type: string
        default: 'https://golfersplus.vercel.app'

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      RUN_ID: ${{ inputs.run_id }}
      BASE_URL: ${{ inputs.base_url }}
      CALLBACK_URL: ${{ vars.E2E_CALLBACK_URL || 'https://golfersplus.vercel.app' }}/api/admin/e2e/runs/${{ inputs.run_id }}/callback
      CALLBACK_SECRET: ${{ secrets.E2E_CALLBACK_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Notificar inicio (running)
        run: |
          curl -fsS -X POST "$CALLBACK_URL" \
            -H "x-e2e-callback-secret: $CALLBACK_SECRET" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"running\",\"github_run_id\":${{ github.run_id }},\"github_run_url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",\"commit_sha\":\"${{ github.sha }}\"}" \
            || echo "Callback inicio falló (no fatal — la corrida sigue)"

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        id: playwright
        continue-on-error: true
        env:
          PLAYWRIGHT_BASE_URL: ${{ env.BASE_URL }}
          # global-setup.ts y los specs usan E2E_TEST_USER_EMAIL/PASSWORD —
          # los GH secrets se llaman E2E_USER_EMAIL/PASSWORD para evitar
          # confusión con E2E (end-to-end) en la naming convention. Mapeamos.
          E2E_TEST_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_TEST_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
        run: |
          npx playwright test --reporter=json > playwright-output.json 2> playwright-stderr.log || true
          PT_EXIT=$?
          echo "exit_code=$PT_EXIT" >> "$GITHUB_OUTPUT"
          echo "=== File sizes ==="
          wc -c playwright-output.json playwright-stderr.log || true
          echo "=== Playwright stderr (full) ==="
          cat playwright-stderr.log || echo "(empty)"
          echo "=== Playwright output stats/errors ==="
          node -e "
            const fs = require('fs');
            const raw = fs.readFileSync('playwright-output.json', 'utf8');
            const i = raw.indexOf('{');
            if (i < 0) { console.log('NO JSON'); process.exit(0); }
            try {
              const j = JSON.parse(raw.slice(i));
              console.log('top-level keys:', Object.keys(j));
              console.log('stats:', JSON.stringify(j.stats));
              console.log('errors:', JSON.stringify(j.errors));
              console.log('suites count:', j.suites?.length ?? 'no suites key');
              if (j.suites?.length) {
                console.log('first suite:', JSON.stringify({title: j.suites[0].title, file: j.suites[0].file, specs: j.suites[0].specs?.length, suites: j.suites[0].suites?.length}));
              }
            } catch (e) {
              console.log('parse error:', e.message);
              console.log('first 300 chars:', raw.slice(i, i+300));
            }
          " || echo "(node debug failed)"

      - name: Parse results y armar payload
        id: parse
        # Lógica de parsing extraída a scripts/parse-playwright-output.mjs
        # (testeada en src/__tests__/parse-playwright-output.test.ts).
        run: node scripts/parse-playwright-output.mjs

      - name: Notificar resultado
        if: always()
        run: |
          if [ ! -f callback-payload.json ]; then
            curl -fsS -X POST "$CALLBACK_URL" \
              -H "x-e2e-callback-secret: $CALLBACK_SECRET" \
              -H "Content-Type: application/json" \
              -d '{"status":"error","error_message":"Workflow crasheó antes de generar payload."}' \
              || echo "Callback final también falló"
          else
            curl -fsS -X POST "$CALLBACK_URL" \
              -H "x-e2e-callback-secret: $CALLBACK_SECRET" \
              -H "Content-Type: application/json" \
              --data @callback-payload.json
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report-${{ inputs.run_id }}
          path: playwright-report/
          retention-days: 7
